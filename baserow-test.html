<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Integração Baserow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Integração Baserow</h1>
            <p class="text-slate-400 text-sm">Teste de envio de dados (Nome e Telefone)</p>
        </div>

        <form id="baserowForm" class="space-y-6">
            <div>
                <label for="nome" class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-wider">Nome</label>
                <input type="text" id="nome" required 
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors"
                    placeholder="Digite o nome">
            </div>

            <div>
                <label for="telefone" class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-wider">Telefone</label>
                <input type="text" id="telefone" required 
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors"
                    placeholder="(00) 00000-0000">
            </div>

            <button type="submit" id="btnSubmit" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                Enviar para Baserow
            </button>
        </form>

        <div id="statusMessage" class="mt-6 text-center text-sm font-medium hidden p-4 rounded-xl"></div>
        
        <div class="mt-6 pt-6 border-t border-slate-700 text-center space-y-2">
             <p class="text-xs text-slate-500">Tabela ID: <span class="text-slate-300 font-mono">790445</span></p>
             <p class="text-[10px] text-slate-600">Token: ...Z7DjO</p>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES DE CONEXÃO ---
        const API_TOKEN = "F8GFKmBE1y0uA2YzDW0LL6Bt2kxZ7DjO";
        const TABLE_ID = "790445";
        
        // URL da API (usando user_field_names=true para aceitar 'Nome' em vez de 'field_123')
        const API_URL = `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=true`;

        const form = document.getElementById('baserowForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Estado de Carregamento
            const originalBtnText = btnSubmit.innerText;
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<svg class="animate-spin h-5 w-5 text-white inline mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Enviando...`;
            statusMessage.classList.add('hidden');

            // Preparar os dados (JSON Payload) - CPF REMOVIDO
            const payload = {
                "Nome": document.getElementById('nome').value,
                "Telefone": document.getElementById('telefone').value
            };

            console.log("Enviando payload:", payload);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Token ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    // Trata erros detalhados do Baserow (ex: campo não existe)
                    const errorDetails = JSON.stringify(data.detail || data);
                    throw new Error(errorDetails);
                }

                // Sucesso
                console.log("Sucesso:", data);
                statusMessage.innerHTML = `✅ <strong>Sucesso!</strong><br>Registro criado com ID: ${data.id}`;
                statusMessage.className = "mt-6 text-center text-sm font-medium p-4 rounded-xl bg-green-500/10 text-green-400 border border-green-500/20";
                statusMessage.classList.remove('hidden');
                form.reset();

            } catch (error) {
                console.error("Erro na requisição:", error);
                
                let errorMsg = error.message;
                if (errorMsg.includes("ERROR_FIELD_NOT_IN_TABLE")) {
                    errorMsg = "Erro: Um dos campos ('Nome' ou 'Telefone') não existe na sua tabela do Baserow.";
                }

                statusMessage.innerHTML = `❌ <strong>Erro ao Salvar:</strong><br>${errorMsg}`;
                statusMessage.className = "mt-6 text-center text-sm font-medium p-4 rounded-xl bg-red-500/10 text-red-400 border border-red-500/20 overflow-hidden break-words";
                statusMessage.classList.remove('hidden');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = originalBtnText;
            }
        });
    </script>
</body>
</html>
